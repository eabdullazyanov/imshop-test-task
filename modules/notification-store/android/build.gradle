plugins {
  id 'com.android.library'
  id 'expo-module-gradle-plugin'
}

group = 'expo.modules.notificationstore'
version = '0.7.10'

android {
  namespace "expo.modules.notificationstore"
  defaultConfig {
    versionCode 1
    versionName "0.7.10"
  }
  lintOptions {
    abortOnError false
  }
}

dependencies {
  implementation 'com.onesignal:OneSignal:[5.0.0, 5.99.99]'
}
